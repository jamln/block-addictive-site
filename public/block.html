<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>访问受限 - Block Addictive Site</title>
  <style>
    :root {
      --dynamic-bg: url('https://picsum.photos/1920/1080');
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    .bg-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #1a1b26;
      background-image: var(--dynamic-bg);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: -1;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 16px;
      padding: 35px 38px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      max-width: 470px;
      color: #fff;
    }

    .glass-card h1 {
      margin: 0 0 12px 0;
      font-size: 28px;
      font-weight: 600;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
      letter-spacing: 1px;
    }

    .glass-card .icon {
      font-size: 60px;
      margin-bottom: 16px;
      display: block;
    }

    .glass-card p {
      margin: 0 0 30px 0;
      font-size: 16px;
      line-height: 1.6;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
      color: rgba(255, 255, 255, 0.9);
    }

    .glass-card button {
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .glass-card button:hover {
      background: #fff;
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(255, 255, 255, 0.4);
    }
  </style>
</head>
<body>
  <div class="bg-layer"></div>

  <div class="container">
    <div class="glass-card">
      <span class="icon">🛑</span>
      <h1 id="blockHeading">专注时间</h1>
      <p id="blockMessage">
        当前网站已被 Block Addictive Site 暂时拦截。<br>
        请保持专注，稍后再来处理这些信息。
      </p>
      <button id="closeBtn">关闭页面</button>
    </div>
  </div>

  <script src="block.js"></script>
</body>
</html>
